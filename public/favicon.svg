<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Terminal block body -->
  <rect x="3" y="5" width="26" height="22" rx="3" fill="#0d1014"/>
  <!-- Inset highlight -->
  <rect x="3.5" y="5.5" width="25" height="21" rx="2.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Left terminal contact -->
  <circle cx="2" cy="16" r="2.5" fill="#d4a017"/>
  <!-- Right terminal contact -->
  <circle cx="30" cy="16" r="2.5" fill="#d4a017"/>
  <!-- SC monogram -->
  <text x="16" y="20.5" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-weight="700" font-size="11" fill="#d4a017" letter-spacing="-0.5">SC</text>
</svg>
